name: Update Game Recording

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  record-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install recording dependencies
        run: |
          npm install puppeteer-core@latest
          sudo apt-get install -y ffmpeg
      
      - name: Record game
        run: node scripts/record-game.js
        env:
          GITHUB_USERNAME: prayag78
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/game-recording.webp
          git diff --staged --quiet || git commit -m "chore: Update game recording GIF [skip ci]"
          git push
